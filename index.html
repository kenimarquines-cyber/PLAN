<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* =========================================
           1. ESTILOS BASE Y TELÉFONO
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: white;
            padding: 20px 0;
        }

        .phone {
            width: 390px;
            min-height: 844px;
            height: auto;
            background-image: url(fondo.png);
            background-size: cover;
            background-position: center;
            border-radius: 0px;
            padding: 80px 25px 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .top-icon {
            position: absolute;
            top: 40px;
            font-size: 22px;
            color: #d4af37;
            text-decoration: none;
            z-index: 10;
        }

        .top-icon.left { left: 25px; }
        .top-icon.right { right: 25px; }

        .title { text-align: center; font-size: 20px; font-weight: 600; letter-spacing: 2px; margin-bottom: 30px; }
        
        .profile-pic-container { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: #444; margin: 0 auto; position: relative; 
            display: flex; justify-content: center; align-items: center; 
        }

        .profile-img-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; overflow: hidden; }
        .profile-img-preview i { font-size: 80px; color: #ccc; }

        .edit-photo-pencil { 
            position: absolute; right: 0px; bottom: 0px; 
            background: #d4af37; width: 35px; height: 35px; 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; z-index: 5;
        }
        .edit-photo-pencil i { font-size: 16px; color: black; }

        .user-type { display: flex; justify-content: center; margin: 35px 0; background: #333; border-radius: 25px; overflow: hidden; }
        .user-type span { flex: 1; text-align: center; padding: 12px; font-size: 15px; opacity: 0.5; }
        .user-type .active { background: #ddd; color: black; opacity: 1; font-weight: 600; }

        .field { margin: 28px 0; position: relative; }
        .field label { font-size: 14px; color: #ddd; }
        .field input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #555; padding: 10px 35px 8px 0; color: white; font-size: 16px; outline: none; }
        .field i { position: absolute; right: 0; bottom: 12px; color: #d4af37; font-size: 14px; cursor: pointer; }

        .config-menu { display: none; position: absolute; top: 70px; left: 20px; background: #333; border-radius: 10px; padding: 10px; width: 150px; z-index: 100; }
        .config-menu.show { display: block; }
        .config-option { display: block; color: white; text-decoration: none; padding: 10px; font-size: 14px; border-bottom: 1px solid #555; }

        /* =========================================
           2. ESTILOS MODALES
           ========================================= */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); 
            z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-overlay.show { display: flex; }

        .modal-content {
            background-color: rgba(255, 215, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 40px 20px;
            border-radius: 60px;
            text-align: center;
            color: white;
            position: relative;
        }

        .modal-content-small { width: 85%; max-width: 350px; }
        .modal-content-large { width: 90%; max-width: 380px; max-height: 90vh; overflow-y: auto; }

        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 24px; cursor: pointer; color: white; }
        .modal-instruction { font-weight: bold; font-size: 14px; margin-bottom: 20px; text-transform: uppercase; }

        .modal-input { 
            width: 90%; padding: 12px; border-radius: 25px; border: none; 
            margin-bottom: 20px; outline: none; text-align: center; font-weight: 600;
        }
        
        .save-btn { 
            background-color: black; color: white; border: none; 
            padding: 10px 30px; border-radius: 20px; cursor: pointer; 
            font-weight: bold; margin-top: 10px;
        }

        .photo-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; padding: 10px 0 20px; justify-items: center;
        }

        .profile-option {
            width: 85px; height: 85px; border-radius: 15px;
            background-color: #333; cursor: pointer; overflow: hidden;
            border: 4px solid transparent; transition: 0.2s;
        }

        .profile-option img { width: 100%; height: 100%; object-fit: cover; }
        .profile-option.selected { border-color: #00FF00; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="phone">
        <a href="#" class="top-icon left" onclick="toggleMenu()"><i class="fa-solid fa-gear"></i></a>
        <a href="#" class="top-icon right" onclick="openNotificationModal()"><i class="fa-solid fa-bell"></i></a>

        <div class="config-menu" id="configMenu">
            <a href="#" class="config-option">RESERVAS</a>
            <a href="#" class="config-option">CERRAR SESIÓN</a>
        </div>

        <div class="title">PERFIL</div>

        <div class="profile-pic-container">
            <div id="mainProfilePic" class="profile-img-preview">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="edit-photo-pencil" onclick="openPhotoModal()">
                <i class="fa-solid fa-pencil"></i>
            </div>
        </div>

        <div class="user-type">
            <span>PERSONAL</span>
            <span class="active">TRABAJADOR</span>
        </div>

        <div class="field">
            <label>NOMBRE</label>
            <input type="text" id="input-nombre" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openTextModal('NOMBRE', 'input-nombre')"></i>
        </div>

        <div class="field">
            <label>APELLIDO</label>
            <input type="text" id="input-apellido" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openTextModal('APELLIDO', 'input-apellido')"></i>
        </div>

        <div class="field">
            <label>CORREO</label>
            <input type="email" id="input-correo" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openTextModal('CORREO ELECTRÓNICO', 'input-correo')"></i>
        </div>

        <div class="field">
            <label>TELÉFONO</label>
            <input type="text" id="input-telefono" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openTextModal('TELÉFONO', 'input-telefono')"></i>
        </div>
    </div>

    <div class="modal-overlay" id="textEditModal">
        <div class="modal-content modal-content-small">
            <span class="close-btn" onclick="closeTextModal()">&times;</span>
            <p class="modal-instruction">INGRESE SU NUEVO DATO</p>
            <input type="text" class="modal-input" id="textValueModal">
            <button class="save-btn" onclick="saveTextChange()">GUARDAR</button>
        </div>
    </div>

    <div class="modal-overlay" id="photoEditModal">
        <div class="modal-content modal-content-large">
            <span class="close-btn" onclick="closePhotoModal()">&times;</span>
            <p class="modal-instruction">ELEGIR FOTO DE PERFIL</p>
            <div class="photo-grid">
                <div class="profile-option selected" data-photo-src="a.jpg" onclick="selectPhoto(this)"><img src="a.jpg"></div>
                <div class="profile-option" data-photo-src="b.jpg" onclick="selectPhoto(this)"><img src="b.jpg"></div>
                <div class="profile-option" data-photo-src="c.jpg" onclick="selectPhoto(this)"><img src="c.jpg"></div>
                <div class="profile-option" data-photo-src="d.jpg" onclick="selectPhoto(this)"><img src="d.jpg"></div>
                <div class="profile-option" data-photo-src="e.jpg" onclick="selectPhoto(this)"><img src="e.jpg"></div>
                <div class="profile-option" data-photo-src="f.jpg" onclick="selectPhoto(this)"><img src="f.jpg"></div>
                <div class="profile-option" data-photo-src="g.jpg" onclick="selectPhoto(this)"><img src="g.jpg"></div>
                <div class="profile-option" data-photo-src="h.jpeg" onclick="selectPhoto(this)"><img src="h.jpeg"></div>
                <div class="profile-option" data-photo-src="i.png" onclick="selectPhoto(this)"><img src="i.png"></div>
            </div>
            <button class="save-btn" onclick="applyPhotoChange()">ACEPTAR</button>
        </div>
    </div>

    <div class="modal-overlay" id="notificationModal">
        <div class="modal-content modal-content-small">
            <span class="close-btn" onclick="closeNotificationModal()">&times;</span>
            <i class="fa-solid fa-bell" style="font-size: 40px; color: white; margin-bottom: 15px;"></i>
            <p class="modal-instruction">NOTIFICACIONES</p>
            <p style="margin-bottom: 20px;">Tienes 0 notificaciones</p>
            <button class="save-btn" onclick="closeNotificationModal()">ENTENDIDO</button>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("configMenu").classList.toggle("show");
        }

        // --- Lógica Textos ---
        let currentTextFieldId = "";
        function openTextModal(campo, id) {
            currentTextFieldId = id;
            document.querySelector("#textEditModal .modal-instruction").innerText = "INGRESE SU " + campo;
            document.getElementById("textEditModal").classList.add("show");
        }
        function closeTextModal() { document.getElementById("textEditModal").classList.remove("show"); }
        function saveTextChange() {
            let val = document.getElementById("textValueModal").value;
            if(val.trim()) document.getElementById(currentTextFieldId).value = val;
            closeTextModal();
        }

        // --- Lógica Fotos ---
        let selectedPhotoSrc = "a.jpg";
        function openPhotoModal() { document.getElementById("photoEditModal").classList.add("show"); }
        function closePhotoModal() { document.getElementById("photoEditModal").classList.remove("show"); }
        function selectPhoto(el) {
            document.querySelectorAll(".profile-option").forEach(opt => opt.classList.remove("selected"));
            el.classList.add("selected");
            selectedPhotoSrc = el.getAttribute("data-photo-src");
        }
        function applyPhotoChange() {
            document.getElementById("mainProfilePic").innerHTML = `<img src="${selectedPhotoSrc}" class="profile-img-preview">`;
            closePhotoModal();
        }

        // --- Lógica Notificaciones ---
        function openNotificationModal() { document.getElementById("notificationModal").classList.add("show"); }
        function closeNotificationModal() { document.getElementById("notificationModal").classList.remove("show"); }

        // Cerrar al hacer clic fuera
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                closeTextModal();
                closePhotoModal();
                closeNotificationModal();
            }
        }
    </script>
</body>
</html>
