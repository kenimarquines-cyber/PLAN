<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: white;
            padding-top: 20px;
        }

        .phone {
            width: 390px;
            height: 844px;
            background-image: url(fondo.png);
            background-size: cover;
            background-position: center;
            padding: 80px 25px;
            position: relative;
            overflow: hidden;
        }

        .top-icon {
            position: absolute;
            top: 40px;
            font-size: 22px;
            color: #d4af37;
            text-decoration: none;
            z-index: 10;
        }

        .top-icon.left { left: 25px; }
        .top-icon.right { right: 25px; }

        .title { text-align: center; font-size: 20px; font-weight: 600; letter-spacing: 2px; margin-bottom: 30px; }
        
        .profile-pic { 
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            background: #444; 
            margin: 0 auto; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 80px; 
            color: #ccc; 
        }

        .user-type { display: flex; justify-content: center; margin: 35px 0; background: #333; border-radius: 25px; overflow: hidden; }
        .user-type span { flex: 1; text-align: center; padding: 12px; font-size: 15px; opacity: 0.5; }
        .user-type .active { background: #ddd; color: black; opacity: 1; font-weight: 600; }

        .field { margin: 28px 0; position: relative; }
        .field label { font-size: 14px; color: #ddd; }
        .field input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #555; padding: 10px 35px 8px 0; color: white; font-size: 16px; outline: none; }
        .field i { position: absolute; right: 0; bottom: 12px; color: #d4af37; font-size: 14px; cursor: pointer; }

        .config-menu { display: none; position: absolute; top: 70px; left: 20px; background: #333; border-radius: 10px; padding: 10px; width: 150px; z-index: 100; }
        .config-menu.show { display: block; }
        .config-option { display: block; color: white; text-decoration: none; padding: 10px; font-size: 14px; border-bottom: 1px solid #555; }

        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0, 0, 0, 0.7); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
        }

        .modal-content {
            background-color: rgba(255, 196, 0, 0.205);
            backdrop-filter: blur(1px); 
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(255, 200, 18, 0.5);
            padding: 40px 20px;
            border-radius: 60px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .modal-instruction {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .modal-input {
            width: 90%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
            font-weight: 600;
        }

        .save-btn { background: black; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .modal-overlay.show { display: flex; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 24px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="phone">
        <a href="#" class="top-icon left" onclick="toggleMenu()"><i class="fa-solid fa-gear"></i></a>
        <a href="#" class="top-icon right"><i class="fa-solid fa-bell"></i></a>

        <div class="config-menu" id="configMenu">
            <a href="#" class="config-option">RESERVAS</a>
            <a href="#" class="config-option">CERRAR SESIÓN</a>
        </div>

        <div class="title">PERFIL</div>

        <div class="profile-pic">
            <i class="fa-solid fa-user"></i>
        </div>

        <div class="user-type">
            <span>PERSONAL</span>
            <span class="active">TRABAJADOR</span>
        </div>

        <div class="field">
            <label>NOMBRE</label>
            <input type="text" id="input-nombre" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openModal('NOMBRE', 'input-nombre')"></i>
        </div>

        <div class="field">
            <label>APELLIDO</label>
            <input type="text" id="input-apellido" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openModal('APELLIDO', 'input-apellido')"></i>
        </div>

        <div class="field">
            <label>CORREO</label>
            <input type="email" id="input-correo" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openModal('CORREO', 'input-correo')"></i>
        </div>

        <div class="field">
            <label>TELÉFONO</label>
            <input type="text" id="input-telefono" readonly value="">
            <i class="fa-solid fa-pencil" onclick="openModal('TELÉFONO', 'input-telefono')"></i>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <p class="modal-instruction">INGRESE NUEVO DATO</p>
            <input type="text" class="modal-input" id="valormodal">
            <button class="save-btn" onclick="guardarCambio()">GUARDAR</button>
        </div>
    </div>

    <script>
        let campoActualId = "";

        function toggleMenu() {
            document.getElementById("configMenu").classList.toggle("show");
        }

        function openModal(textoCampo, idInput) {
            campoActualId = idInput;
            document.querySelector(".modal-instruction").innerText = "INGRESE SU NUEVO " + textoCampo;
            document.getElementById("valormodal").value = "";
            document.getElementById("editModal").classList.add("show");
        }

        function closeModal() {
            document.getElementById("editModal").classList.remove("show");
        }

        function guardarCambio() {
            var nuevoValor = document.getElementById("valormodal").value;
            if (nuevoValor.trim() !== "" && campoActualId !== "") {
                document.getElementById(campoActualId).value = nuevoValor;
            }
            closeModal();
        }

        window.onclick = function(event) {
            var modal = document.getElementById("editModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
